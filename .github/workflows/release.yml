name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            archive: tar.gz
            name: linux-x86_64-headless

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--all-features"
            archive: tar.gz
            name: linux-x86_64-full
            deps: libglib2.0-dev libgtk-3-dev libxdo-dev libxcb-shape0-dev libxcb-xfixes0-dev

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            archive: tar.gz
            name: linux-aarch64-headless

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: "--all-features"
            archive: zip
            name: windows-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            features: "--all-features"
            archive: tar.gz
            name: macos-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            features: "--all-features"
            archive: tar.gz
            name: macos-x86_64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install Linux GUI dependencies
        if: matrix.deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/fry-tftp-server || true
          else
            strip target/${{ matrix.target }}/release/fry-tftp-server || true
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fry-tftp-server-${{ matrix.name }}.tar.gz fry-tftp-server
          cd ../../..

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/fry-tftp-server.exe" -DestinationPath "fry-tftp-server-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fry-tftp-server-${{ matrix.name }}
          path: fry-tftp-server-${{ matrix.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort || ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
