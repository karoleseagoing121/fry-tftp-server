name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: "--no-default-features"
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: "--all-features"
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            features: "--no-default-features"
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            features: "--all-features"
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            features: "--all-features"
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fry-tftp-server-${{ matrix.target }}.tar.gz fry-tftp-server
          cd ../../..

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/fry-tftp-server.exe" -DestinationPath "fry-tftp-server-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fry-tftp-server-${{ matrix.target }}
          path: fry-tftp-server-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
